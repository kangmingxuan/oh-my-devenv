name: Apply Tests

on:
  push:
  pull_request:

# A heavier, integration-level check than Smoke Tests. The smoke suite only
# renders templates and syntax-checks them; it never runs the installers. This
# workflow performs a real `chezmoi init --apply` end to end on a throwaway
# runner and asserts the final environment check passes, so a semantic break in
# an installer (a bad package name, a broken `go install` line, a regressed
# idempotency probe) is caught instead of slipping through render-only CI.
jobs:
  apply-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Configure a custom XDG config root
        run: echo "XDG_CONFIG_HOME=$RUNNER_TEMP/xdg-config" >> "$GITHUB_ENV"
      - name: Install chezmoi
        run: |
          mkdir -p "$HOME/.local/bin"
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Bootstrap the baseline end to end
        run: |
          tmp_data_file="$RUNNER_TEMP/chezmoi-data.toml"
          tmp_config_file="$RUNNER_TEMP/chezmoi.toml"

          cat >"$tmp_data_file" <<'EOF'
          gitName = "CI Runner"
          gitEmail = "ci@example.com"
          desktopBaseline = false
          EOF

          chezmoi execute-template --init \
            --source="$PWD" \
            --override-data-file "$tmp_data_file" \
            --file "$PWD/.chezmoi.toml.tmpl" >"$tmp_config_file"

          chezmoi apply --source="$PWD" --config "$tmp_config_file" \
            2>&1 | tee "$HOME/apply.log"
      - name: Assert the environment check passed
        run: |
          grep -Fq "All checks passed." "$HOME/apply.log"
          test -f "$XDG_CONFIG_HOME/mise/config.toml"
          test -f "$XDG_CONFIG_HOME/fontconfig/conf.d/99-oh-my-devenv-maple-mono-nf-cn.conf"
          test ! -e "$HOME/.config/mise/config.toml"

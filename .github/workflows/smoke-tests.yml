name: Smoke Tests

on:
  push:
  pull_request:

jobs:
  smoke-tests-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install smoke dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            curl git zsh ca-certificates xz-utils shellcheck
      - name: Install chezmoi
        run: |
          mkdir -p "$HOME/.local/bin"
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Run smoke tests
        run: bash bootstrap/scripts/run-smoke-tests.sh

  smoke-tests-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install smoke dependencies
        run: brew install chezmoi shellcheck
      - name: Run smoke tests
        # Running on macOS renders the `darwin` template arms (brew shellenv,
        # mac PATH wiring, OrbStack SSH include) that the Linux job never
        # exercises, so a Darwin-only syntax error can no longer pass CI.
        run: bash bootstrap/scripts/run-smoke-tests.sh

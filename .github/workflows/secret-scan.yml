name: Secret Scan

on:
  push:
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run gitleaks (repository scan)
        # Pinned to match the gitleaks rev in .pre-commit-config.yaml. The
        # pre-commit hook only scans staged changes, so CI scans the whole tree.
        run: |
          version=8.30.1
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" \
            | tar -xzf - gitleaks
          ./gitleaks dir --redact --verbose .

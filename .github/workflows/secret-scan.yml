name: Secret Scan

on:
  push:
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install pre-commit
        run: python -m pip install --upgrade pre-commit
      - name: Run secret scan
        run: pre-commit run --all-files
